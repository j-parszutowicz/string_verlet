name: Pytest CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Downloading code
      uses: actions/checkout@v4

    - name: Installing python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Tests
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]
        pytest