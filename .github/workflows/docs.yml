name: Deploy Documentation

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Downloading code
      uses: actions/checkout@v4

    - name: Installing python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Generating doc (pdoc)
      run: |
        pip install pdoc numpy numba
        pip install -e .
        python -m pdoc -o html string_verlet

    - name: Publishing on Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: html